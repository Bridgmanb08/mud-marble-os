<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mud & Marble OS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#F7F6F3;--surface:#FFF;--border:#E5E3DC;--border-md:#D1CFC7;
  --text:#1A1A18;--t2:#6B6A65;--t3:#9E9C96;--accent:#1A1A18;
  --green:#1D9E75;--gbg:#E1F5EE;--gtx:#0F6E56;
  --amber:#EF9F27;--abg:#FAEEDA;--atx:#854F0B;
  --red:#E24B4A;--rbg:#FCEBEB;--rtx:#A32D2D;
  --blue:#378ADD;--bbg:#E6F1FB;--btx:#185FA5;
  --gray-bg:#F1EFE8;--gray-tx:#5F5E5A;
  --purple-bg:#EEEDFE;--purple-tx:#534AB7;
  --r:8px;--rl:12px;--sb:200px;--tb:52px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;}
/* Layout */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--tb);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;}
.logo-name{font-size:14px;font-weight:600;}
.logo-sub{font-size:12px;color:var(--t2);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.sidebar{position:fixed;top:var(--tb);left:0;bottom:0;width:var(--sb);background:var(--surface);border-right:1px solid var(--border);padding:12px 0;overflow-y:auto;z-index:90;}
.nav-section{font-size:10px;font-weight:600;color:var(--t3);padding:14px 16px 4px;letter-spacing:.8px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 16px;font-size:13px;color:var(--t2);cursor:pointer;border-left:2px solid transparent;transition:all .1s;}
.nav-item:hover{color:var(--text);background:var(--bg);}
.nav-item.active{color:var(--text);border-left-color:var(--accent);background:var(--bg);font-weight:500;}
.nav-item i{font-size:16px;flex-shrink:0;}
.main{margin-left:var(--sb);margin-top:var(--tb);padding:24px;min-height:calc(100vh - var(--tb));}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;font-size:13px;font-family:var(--font);border-radius:var(--r);cursor:pointer;border:1px solid var(--border-md);background:var(--surface);color:var(--text);transition:all .1s;white-space:nowrap;}
.btn:hover{background:var(--bg);}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-p:hover{background:#333;}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-ghost{border-color:transparent;background:transparent;}
.btn-ghost:hover{background:var(--bg);border-color:var(--border);}
/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;}
.bg-green{background:var(--gbg);color:var(--gtx);}
.bg-amber{background:var(--abg);color:var(--atx);}
.bg-red{background:var(--rbg);color:var(--rtx);}
.bg-blue{background:var(--bbg);color:var(--btx);}
.bg-gray{background:var(--gray-bg);color:var(--gray-tx);}
.bg-purple{background:var(--purple-bg);color:var(--purple-tx);}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
.dot-g{background:var(--green);}.dot-a{background:var(--amber);}.dot-r{background:var(--red);}
/* Cards & metrics */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:20px;}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;}
.m-label{font-size:11px;color:var(--t2);margin-bottom:6px;font-weight:500;}
.m-val{font-size:22px;font-weight:600;color:var(--text);line-height:1;}
.m-sub{font-size:11px;color:var(--t3);margin-top:4px;}
/* Page header */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;}
.ph h1{font-size:18px;font-weight:600;}
.ph p{font-size:13px;color:var(--t2);margin-top:2px;}
/* Filters */
.filters{display:flex;gap:6px;flex-wrap:wrap;}
.fb{padding:4px 12px;font-size:12px;border-radius:20px;border:1px solid var(--border-md);background:var(--surface);color:var(--t2);cursor:pointer;transition:all .1s;}
.fb:hover{color:var(--text);}
.fb.on{background:var(--accent);color:#fff;border-color:var(--accent);}
/* Section header */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.st{font-size:13px;font-weight:600;}
/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{text-align:left;padding:8px 12px;color:var(--t2);font-weight:500;font-size:11px;border-bottom:1px solid var(--border);white-space:nowrap;}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tbl tbody tr:last-child td{border-bottom:none;}
.tbl tbody tr:hover td{background:var(--bg);cursor:pointer;}
/* Project card */
.pc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:border-color .1s;margin-bottom:6px;}
.pc:hover{border-color:var(--border-md);}
.pi{flex:1;min-width:0;}
.pn{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ps{font-size:12px;color:var(--t2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pm{display:flex;align-items:center;gap:16px;flex-shrink:0;}
/* Forms */
.fg{margin-bottom:14px;}
.fl{display:block;font-size:11px;font-weight:500;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
.fi{width:100%;padding:8px 10px;font-size:13px;font-family:var(--font);border:1px solid var(--border-md);border-radius:var(--r);background:var(--surface);color:var(--text);}
.fi:focus{outline:none;border-color:var(--accent);}
textarea.fi{resize:vertical;min-height:80px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
/* Modals */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;}
.mb{background:var(--surface);border-radius:var(--rl);border:1px solid var(--border);width:500px;max-height:85vh;overflow-y:auto;padding:24px;}
.mb.wide{width:680px;}
.mb.xl{width:800px;}
.mt{font-size:16px;font-weight:600;margin-bottom:20px;}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
.merr{background:var(--rbg);color:var(--rtx);padding:8px 12px;border-radius:var(--r);font-size:12px;margin-bottom:14px;}
/* Toasts */
.tw{position:fixed;bottom:24px;right:24px;z-index:300;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--accent);color:#fff;padding:10px 16px;border-radius:var(--r);font-size:13px;}
/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 20px;}
.tab{padding:11px 14px;font-size:13px;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;}
.tab:hover{color:var(--text);}
.tab.on{color:var(--text);font-weight:500;border-bottom-color:var(--accent);}
.tb{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--rl) var(--rl);padding:20px;min-height:200px;}
/* Estimate */
.ebh{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--bg);border-radius:var(--r);margin-bottom:6px;}
.egrand{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:var(--accent);border-radius:var(--rl);margin-top:16px;color:#fff;}
/* Info grid */
.ig{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.ibt{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:10px;}
.ir{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);}
.ir:last-child{border-bottom:none;}
.ik{font-size:12px;color:var(--t2);}
.iv{font-size:12px;font-weight:500;text-align:right;}
/* CO, invoice, sched rows */
.coc{border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:8px;}
.coh{display:flex;align-items:center;justify-content:space-between;}
.invr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:1px solid var(--border);border-radius:var(--rl);margin-bottom:8px;}
.scr{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--rl);margin-bottom:6px;}
.sci{flex:1;}
/* Task board */
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:4px;}
.col{background:var(--bg);border-radius:var(--rl);padding:12px;}
.col-hd{font-size:12px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;cursor:pointer;}
.task-card:hover{border-color:var(--border-md);}
.task-title{font-size:12px;font-weight:500;margin-bottom:4px;}
.task-meta{font-size:11px;color:var(--t2);}
.task-card.priority-high{border-left:3px solid var(--red);}
.task-card.priority-medium{border-left:3px solid var(--amber);}
.task-card.priority-low{border-left:3px solid var(--green);}
/* Alerts */
.alert{border-radius:var(--rl);padding:12px 16px;margin-bottom:16px;font-size:13px;}
.alert-a{background:var(--abg);border:1px solid var(--amber);color:var(--atx);}
.alert-r{background:var(--rbg);border:1px solid var(--red);color:var(--rtx);}
/* Client/sub cards */
.cc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;margin-bottom:6px;}
.cc:hover{border-color:var(--border-md);}
.av{width:38px;height:38px;border-radius:50%;background:var(--bbg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--btx);flex-shrink:0;}
.lc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 18px;margin-bottom:6px;cursor:pointer;}
.lc:hover{border-color:var(--border-md);}
/* Empty */
.empty{text-align:center;padding:48px 20px;}
.empty>i{font-size:32px;color:var(--t3);display:block;margin-bottom:12px;}
.empty-t{font-size:14px;font-weight:500;}
.empty-s{font-size:12px;color:var(--t2);margin-top:4px;margin-bottom:16px;}

/* ═══ OWNER DASHBOARD ═══ */
.owner-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.owner-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px;}
.owner-card.full{grid-column:1/-1;}
.garmin-wrap{display:flex;justify-content:center;align-items:center;padding:16px 0;}
.ring-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--t2);text-align:center;margin-top:8px;}
.proj-timeline{display:flex;flex-direction:column;gap:8px;}
.tl-row{display:flex;align-items:center;gap:10px;}
.tl-name{font-size:12px;font-weight:500;width:160px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tl-bar-wrap{flex:1;height:18px;background:var(--bg);border-radius:4px;position:relative;overflow:hidden;}
.tl-bar{height:100%;border-radius:4px;position:absolute;top:0;}
.tl-today{position:absolute;top:0;bottom:0;width:2px;background:var(--red);z-index:2;}
.tl-pct{font-size:11px;color:var(--t2);width:36px;text-align:right;flex-shrink:0;}
.profit-ring{text-align:center;}
.ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.ring-big{font-size:28px;font-weight:700;line-height:1;}
.ring-tiny{font-size:10px;color:var(--t2);margin-top:2px;}
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px;}
.kpi{text-align:center;padding:12px;background:var(--bg);border-radius:var(--r);}
.kpi-val{font-size:20px;font-weight:700;}
.kpi-label{font-size:10px;color:var(--t2);margin-top:2px;text-transform:uppercase;letter-spacing:.4px;}
.activity-feed{display:flex;flex-direction:column;gap:0;}
.af-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.af-item:last-child{border-bottom:none;}
.af-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.af-body{flex:1;}
.af-text{font-size:12px;color:var(--text);line-height:1.4;}
.af-time{font-size:11px;color:var(--t3);margin-top:2px;}
.health-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.hg-card{border-radius:var(--r);padding:10px 12px;display:flex;align-items:center;gap:10px;border:1px solid var(--border);}
.hg-info{flex:1;min-width:0;}
.hg-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hg-detail{font-size:11px;color:var(--t2);margin-top:1px;}
/* Garmin ring SVG */
.gr-svg{overflow:visible;}
.gr-track{fill:none;stroke-linecap:round;}
.gr-prog{fill:none;stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1);}
@media(max-width:768px){
  :root{--sb:52px;}
  .nav-item span{display:none;}.nav-section{display:none;}
  .metrics,.owner-grid{grid-template-columns:repeat(2,1fr);}
  .board{grid-template-columns:1fr 1fr;}
  .fr,.fr3,.ig,.kpi-row,.health-grid{grid-template-columns:1fr;}
  .owner-card.full{grid-column:auto;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-mark">M&M</div>
    <span class="logo-name">Mud & Marble</span>
    <span class="logo-sub" style="margin-left:4px">OS</span>
  </div>
  <div class="topbar-right">
    <button class="btn btn-sm" id="btn-back" style="display:none" onclick="goBack()">
      <i class="ti ti-arrow-left"></i> <span id="back-label">Back</span>
    </button>
    <button class="btn btn-p btn-sm" onclick="handleNew()">
      <i class="ti ti-plus"></i> <span id="new-label">New project</span>
    </button>
  </div>
</div>

<div class="sidebar">
  <div class="nav-section">Overview</div>
  <div class="nav-item" data-p="dashboard" onclick="nav('dashboard')"><i class="ti ti-gauge"></i> <span>Dashboard</span></div>
  <div class="nav-section">Operations</div>
  <div class="nav-item" data-p="projects" onclick="nav('projects')"><i class="ti ti-building"></i> <span>Projects</span></div>
  <div class="nav-item" data-p="leads" onclick="nav('leads')"><i class="ti ti-user-plus"></i> <span>Leads</span></div>
  <div class="nav-item" data-p="clients" onclick="nav('clients')"><i class="ti ti-users"></i> <span>Clients</span></div>
  <div class="nav-section">Finance</div>
  <div class="nav-item" data-p="estimates" onclick="nav('estimates')"><i class="ti ti-file-dollar"></i> <span>Estimates</span></div>
  <div class="nav-item" data-p="invoices" onclick="nav('invoices')"><i class="ti ti-receipt"></i> <span>Invoices</span></div>
  <div class="nav-item" data-p="change-orders" onclick="nav('change-orders')"><i class="ti ti-git-branch"></i> <span>Change Orders</span></div>
  <div class="nav-section">Team</div>
  <div class="nav-item" data-p="tasks" onclick="nav('tasks')"><i class="ti ti-layout-kanban"></i> <span>Task Board</span></div>
  <div class="nav-item" data-p="schedule" onclick="nav('schedule')"><i class="ti ti-calendar"></i> <span>Schedule</span></div>
  <div class="nav-item" data-p="subcontractors" onclick="nav('subcontractors')"><i class="ti ti-tools"></i> <span>Subcontractors</span></div>
</div>

<div class="main" id="main"></div>
<div class="tw" id="toasts"></div>
<div id="modal-root"></div>

<script>
const SB='https://boekqzxgooinrhxlckbp.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJvZWtxenhnb29pbnJoeGxja2JwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MzQzNzcsImV4cCI6MjA5NzMxMDM3N30.royGJdcO6Aqgol9E0Ldw-mgryq1MQ_SvwJH3cvBlDV8';
const H={'apikey':KEY,'Authorization':`Bearer ${KEY}`,'Content-Type':'application/json','Prefer':'return=representation'};

async function db(t,q=''){const r=await fetch(`${SB}/rest/v1/${t}${q}`,{headers:H});if(!r.ok)throw new Error(await r.text());return r.json();}
async function dbPost(t,d){const r=await fetch(`${SB}/rest/v1/${t}`,{method:'POST',headers:H,body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function dbPatch(t,id,d){const r=await fetch(`${SB}/rest/v1/${t}?id=eq.${id}`,{method:'PATCH',headers:H,body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json();}

const fmt=n=>!n&&n!==0?'—':'$'+Number(n).toLocaleString('en-US',{maximumFractionDigits:0});
const fmtD=d=>d?new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—';
const sl=s=>({lead:'Lead',vetting:'Vetting',estimating:'Estimating',proposed:'Proposed',active:'Active',punch_list:'Punch List',complete:'Complete',on_hold:'On Hold',lost:'Lost'})[s]||s;
const sb=s=>{const m={active:'green',complete:'green',estimating:'amber',proposed:'blue',lead:'gray',vetting:'gray',punch_list:'purple',on_hold:'amber',lost:'red'};return`<span class="badge bg-${m[s]||'gray'}">${sl(s)}</span>`;};
const hd=h=>`<span class="dot dot-${h==='yellow'?'a':h==='red'?'r':'g'}"></span>`;

function toast(msg,err=false){const t=document.createElement('div');t.className='toast';t.style.background=err?'var(--red)':'var(--accent)';t.textContent=msg;document.getElementById('toasts').appendChild(t);setTimeout(()=>t.remove(),2800);}
function showM(h){document.getElementById('modal-root').innerHTML=h;}
function closeM(){document.getElementById('modal-root').innerHTML='';}

let page='dashboard',proj=null,allP=[],_d={};

function nav(p){
  page=p;proj=null;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.p===p));
  const labels={dashboard:'Overview',projects:'New project',leads:'New lead',clients:'New client',estimates:'New estimate',invoices:'New invoice','change-orders':'New CO',tasks:'New task',schedule:'Add task',subcontractors:'Add sub'};
  document.getElementById('new-label').textContent=labels[p]||'New';
  document.getElementById('btn-back').style.display='none';
  render();
}
function goBack(){nav('projects');}
function handleNew(){
  if(page==='projects'||page==='proj-detail')mNewProj();
  else if(page==='leads')mNewLead();
  else if(page==='clients')mNewClient();
  else if(page==='change-orders')mNewCO();
  else if(page==='invoices')mNewInv();
  else if(page==='tasks'||page==='schedule')mNewTask();
  else if(page==='subcontractors')mNewSub();
  else if(page==='estimates')toast('Open a project to create an estimate');
  else if(page==='dashboard')toast('Select a page to add items');
}
async function render(){
  const m=document.getElementById('main');
  m.innerHTML='<div class="empty"><i class="ti ti-loader"></i><div class="empty-t">Loading...</div></div>';
  try{
    if(page==='dashboard')await pDash();
    else if(page==='projects')await pProjects();
    else if(page==='proj-detail')await pDetail();
    else if(page==='leads')await pLeads();
    else if(page==='clients')await pClients();
    else if(page==='estimates')await pEstimates();
    else if(page==='invoices')await pInvoices();
    else if(page==='change-orders')await pCOs();
    else if(page==='tasks')await pTasks();
    else if(page==='schedule')await pSchedule();
    else if(page==='subcontractors')await pSubs();
  }catch(e){m.innerHTML=`<div class="empty"><i class="ti ti-alert-circle" style="color:var(--red)"></i><div class="empty-t">Error loading</div><div class="empty-s">${e.message}</div></div>`;}
}

// ══════════════════════════════════════════════════
// OWNER DASHBOARD
// ══════════════════════════════════════════════════
async function pDash(){
  const [projs,invs,cos,tasks,notes]=await Promise.all([
    db('projects','?is_archived=eq.false&order=created_at.desc&select=*,clients(first_name,last_name)'),
    db('invoices','?order=created_at.desc'),

function drawGarminRings(rings){
  const el=document.getElementById('garmin-rings');
  if(!el)return;
  const size=200;const cx=size/2;const cy=size/2;
  const radii=[72,56,40];
  const sw=12;
  let svg=`<svg width="${size}" height="${size}" class="gr-svg" viewBox="0 0 ${size} ${size}">`;
  rings.forEach((r,i)=>{
    const radius=radii[i];
    const circ=2*Math.PI*radius;
    const offset=circ*(1-(r.pct/100));
    svg+=`<circle class="gr-track" cx="${cx}" cy="${cy}" r="${radius}" stroke="${r.track}" stroke-width="${sw}"/>`;
    svg+=`<circle class="gr-prog" cx="${cx}" cy="${cy}" r="${radius}" stroke="${r.color}" stroke-width="${sw}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" transform="rotate(-90 ${cx} ${cy})"/>`;
  });
  // Center text
  svg+=`<text x="${cx}" y="${cy-8}" text-anchor="middle" font-size="24" font-weight="700" fill="var(--text)">${rings[0].pct}%</text>`;
  svg+=`<text x="${cx}" y="${cy+10}" text-anchor="middle" font-size="10" fill="var(--t2)">PROFIT PULLED</text>`;
  svg+=`</svg>`;
  el.innerHTML=svg;
  // Legend
  el.innerHTML+=`<div style="display:flex;flex-direction:column;gap:6px;margin-left:16px">
    ${rings.map(r=>`<div style="display:flex;align-items:center;gap:8px"><span style="width:10px;height:10px;border-radius:50%;background:${r.color};display:inline-block;flex-shrink:0"></span><span style="font-size:11px;color:var(--t2)">${r.label}: <strong>${r.pct}%</strong></span></div>`).join('')}
  </div>`;
  el.style.display='flex';el.style.alignItems='center';
}

function renderTimeline(projs){
  const today=new Date();
  const allDates=projs.flatMap(p=>[p.start_date,p.estimated_completion].filter(Boolean).map(d=>new Date(d)));
  if(!allDates.length)return'<div style="font-size:13px;color:var(--t2)">Set start and completion dates on projects to see the timeline.</div>';
  const minD=new Date(Math.min(...allDates));
  const maxD=new Date(Math.max(...allDates));
  const range=Math.max((maxD-minD)/864e5,1);
  const todayPct=Math.max(0,Math.min(100,(today-minD)/864e5/range*100));

  let html=`<div style="position:relative;">
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--t2);margin-bottom:8px">
      <span>${minD.toLocaleDateString('en-US',{month:'short',year:'numeric'})}</span>
      <span style="font-weight:500;color:var(--red)">Today</span>
      <span>${maxD.toLocaleDateString('en-US',{month:'short',year:'numeric'})}</span>
    </div>
    <div class="proj-timeline">`;
  projs.filter(p=>p.start_date||p.estimated_completion).forEach(p=>{
    const s=p.start_date?new Date(p.start_date):minD;
    const e=p.estimated_completion?new Date(p.estimated_completion):maxD;
    const left=Math.max(0,(s-minD)/864e5/range*100);
    const width=Math.max(2,(e-s)/864e5/range*100);
    const barColor=p.health_status==='red'?'var(--red)':p.health_status==='yellow'?'var(--amber)':'var(--green)';
    const pct=p.start_date&&p.estimated_completion?Math.max(0,Math.min(100,(today-s)/(e-s)*100)):0;
    html+=`<div class="tl-row">
      <div class="tl-name">${(p.name||'').replace(/\|.*/,'').trim()}</div>
      <div class="tl-bar-wrap">
        <div class="tl-today" style="left:${todayPct}%"></div>
        <div class="tl-bar" style="left:${left}%;width:${width}%;background:${barColor};opacity:.25;"></div>
        <div class="tl-bar" style="left:${left}%;width:${Math.min(width,width*(pct/100))}%;background:${barColor};"></div>
      </div>
      <div class="tl-pct">${Math.round(pct)}%</div>
    </div>`;
  });
  html+=`</div></div>`;
  return html;
}

function renderBoard(tasks){
  const statuses=['upcoming','in_progress','delayed','complete'];
  const labels={upcoming:'To Do',in_progress:'In Progress',delayed:'Delayed / Blocked',complete:'Done'};
  const colors={upcoming:'var(--t3)',in_progress:'var(--amber)',delayed:'var(--red)',complete:'var(--green)'};
  return statuses.map(s=>{
    const col=tasks.filter(t=>s==='delayed'?['delayed','blocked'].includes(t.status):t.status===s);
    return`<div class="col">
      <div class="col-hd"><span style="color:${colors[s]}">${labels[s]}</span><span style="background:var(--border);padding:1px 7px;border-radius:10px;font-size:11px">${col.length}</span></div>
      ${col.map(t=>{
        const now=new Date();const overdue=t.scheduled_end&&new Date(t.scheduled_end)<now&&t.status!=='complete';
        return`<div class="task-card ${t.is_milestone?'priority-high':''}" onclick="mEditTask('${t.id}')">
          <div class="task-title">${t.title}</div>
          <div class="task-meta">${t.projects?.name||'No project'}</div>
          ${t.assigned_to?`<div class="task-meta" style="margin-top:3px"><span style="background:var(--bbg);color:var(--btx);padding:1px 6px;border-radius:10px;font-size:10px">${t.assigned_to}</span></div>`:''}
          ${t.scheduled_end?`<div class="task-meta" style="margin-top:3px;${overdue?'color:var(--red);font-weight:500':''}">${overdue?'⚠ ':''} Due ${fmtD(t.scheduled_end)}</div>`:''}
          ${t.phase?`<div class="task-meta" style="margin-top:2px">${t.phase}</div>`:''}
        </div>`;
      }).join('')}
      <button class="btn btn-ghost btn-sm" style="width:100%;margin-top:6px;color:var(--t2);justify-content:center" onclick="mNewTask(false,'${s}')"><i class="ti ti-plus"></i> Add</button>
    </div>`;
  }).join('');
}

function filterTasks(projId,btn){
  document.querySelectorAll('#task-proj-filters .fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  const f=projId==='all'?window._tasks:window._tasks.filter(t=>t.project_id===projId);
  document.getElementById('task-board').innerHTML=renderBoard(f);
}

async function saveInv(){

}

async function mNewTask(forProj=false,defaultStatus='upcoming'){

    <div class="mt">Add task</div><div id="merr"></div>
    <div class="fg"><label class="fl">Task title</label><input class="fi" id="stn" placeholder="e.g. Tile master bath floor"></div>
    <div class="fr"><div class="fg"><label class="fl">Project</label><select class="fi" id="stp">
      <option value="">— Select project —</option>
      ${projs.map(p=>`<option value="${p.id}"${proj&&p.id===proj.id?' selected':''}>${p.name.replace(/\|.*/,'').trim()}</option>`).join('')}
    </select></div>
    <div class="fg"><label class="fl">Assigned to</label><select class="fi" id="sta"><option value="alex">Alex</option><option value="brent">Brent</option><option value="shannon">Shannon</option><option value="faith">Faith</option><option value="subcontractor">Subcontractor</option></select></div></div>
    <div class="fr"><div class="fg"><label class="fl">Phase</label><input class="fi" id="stph" placeholder="demo, rough, finish..."></div>
    <div class="fg"><label class="fl">Status</label><select class="fi" id="stst">
      <option value="upcoming"${defaultStatus==='upcoming'?' selected':''}>To do</option>
      <option value="in_progress"${defaultStatus==='in_progress'?' selected':''}>In progress</option>
      <option value="delayed"${defaultStatus==='delayed'?' selected':''}>Delayed</option>
      <option value="complete"${defaultStatus==='complete'?' selected':''}>Done</option>
    </select></div></div>
    <div class="fr"><div class="fg"><label class="fl">Start date</label><input class="fi" id="sts" type="date"></div><div class="fg"><label class="fl">End / due date</label><input class="fi" id="ste" type="date"></div></div>
    <div class="fr"><div class="fg"><label class="fl">Priority</label><select class="fi" id="stpr"><option value="">Normal</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select></div>
    <div class="fg" style="display:flex;align-items:center;gap:8px;padding-top:22px"><input type="checkbox" id="stm"><label for="stm" style="font-size:13px">Mark as milestone</label></div></div>
    <div class="fg"><label class="fl">Notes</label><textarea class="fi" id="stnt" placeholder="Task details, instructions..."></textarea></div>
    <div class="ma"><button class="btn" onclick="closeM()">Cancel</button><button class="btn btn-p" onclick="saveTask()"><i class="ti ti-check"></i> Add task</button></div>
  </div></div>`);
}
async function saveTask(){
  const title=document.getElementById('stn').value.trim();if(!title){document.getElementById('merr').innerHTML='<div class="merr">Title required.</div>';return;}
  const pid=document.getElementById('stp').value||proj?.id;if(!pid){document.getElementById('merr').innerHTML='<div class="merr">Select a project.</div>';return;}
  try{await dbPost('schedule_items',{project_id:pid,title,assigned_to:document.getElementById('sta').value,phase:document.getElementById('stph').value.trim(),status:document.getElementById('stst').value,scheduled_start:document.getElementById('sts').value||null,scheduled_end:document.getElementById('ste').value||null,notes:document.getElementById('stnt').value.trim(),is_milestone:document.getElementById('stm').checked});closeM();toast('Task added');
  if(page==='tasks')await pTasks();else if(page==='schedule')await pSchedule();else if(proj){const s=await db('schedule_items',`?project_id=eq.${proj.id}&order=scheduled_start.asc`);_d.scheds=s;document.getElementById('dbody').innerHTML=dSched(s);}}
  catch(e){document.getElementById('merr').innerHTML=`<div class="merr">${e.message}</div>`;}
}

async function mEditTask(id){
  const tasks=window._tasks||[];const t=tasks.find(x=>x.id===id);if(!t)return;
  const projs=await db('projects','?is_archived=eq.false&status=in.(active,estimating,proposed)&select=id,name&order=name.asc');
  showM(`<div class="mo" onclick="if(event.target===this)closeM()"><div class="mb">
    <div class="mt">Edit task</div><div id="merr"></div>
    <div class="fg"><label class="fl">Task title</label><input class="fi" id="etn" value="${t.title}"></div>
    <div class="fr"><div class="fg"><label class="fl">Status</label><select class="fi" id="etst">
      <option value="upcoming"${t.status==='upcoming'?' selected':''}>To do</option>
      <option value="in_progress"${t.status==='in_progress'?' selected':''}>In progress</option>
      <option value="delayed"${t.status==='delayed'?' selected':''}>Delayed</option>
      <option value="blocked"${t.status==='blocked'?' selected':''}>Blocked</option>
      <option value="complete"${t.status==='complete'?' selected':''}>Done</option>
    </select></div>
    <div class="fg"><label class="fl">Assigned to</label><select class="fi" id="eta"><option value="alex"${t.assigned_to==='alex'?' selected':''}>Alex</option><option value="brent"${t.assigned_to==='brent'?' selected':''}>Brent</option><option value="shannon"${t.assigned_to==='shannon'?' selected':''}>Shannon</option><option value="faith"${t.assigned_to==='faith'?' selected':''}>Faith</option><option value="subcontractor"${t.assigned_to==='subcontractor'?' selected':''}>Subcontractor</option></select></div></div>
    <div class="fr"><div class="fg"><label class="fl">End / due date</label><input class="fi" id="ete" type="date" value="${t.scheduled_end||''}"></div>
    <div class="fg"><label class="fl">Phase</label><input class="fi" id="etph" value="${t.phase||''}"></div></div>
    <div class="ma">
      <button class="btn" onclick="closeM()">Cancel</button>
      <button class="btn btn-p" onclick="updateTask('${id}')"><i class="ti ti-check"></i> Save</button>
    </div>
  </div></div>`);
}
async function updateTask(id){
  try{await dbPatch('schedule_items',id,{title:document.getElementById('etn').value.trim(),status:document.getElementById('etst').value,assigned_to:document.getElementById('eta').value,scheduled_end:document.getElementById('ete').value||null,phase:document.getElementById('etph').value.trim()});closeM();toast('Task updated');await pTasks();}
  catch(e){document.getElementById('merr').innerHTML=`<div class="merr">${e.message}</div>`;}
}

function mNewSub(){showM(`<div class="mo" onclick="if(event.target===this)closeM()"><div class="mb wide">
  <div class="mt">Add subcontractor</div><div id="merr"></div>

  <div class="fg"><label class="fl">Notes</label><textarea class="fi" id="snt" placeholder="Notes about this sub..."></textarea></div>

</div></div>`);}
async function saveSub(){
  const company=document.getElementById('scn').value.trim();if(!company){document.getElementById('merr').innerHTML='<div class="merr">Company name required.</div>';return;}
  try{await dbPost('subcontractors',{company_name:company,trade:document.getElementById('str').value.trim(),contact_name:document.getElementById('scnt').value.trim(),phone:document.getElementById('sph').value.trim(),email:document.getElementById('sem').value.trim(),insurance_expiry:document.getElementById('sie').value||null,license_number:document.getElementById('slic').value.trim(),rating:parseInt(document.getElementById('srat').value)||null,preferred:document.getElementById('spref').checked,w9_on_file:document.getElementById('sw9').checked,notes:document.getElementById('snt').value.trim(),is_active:true});closeM();toast('Sub added');nav('subcontractors');}
  catch(e){document.getElementById('merr').innerHTML=`<div class="merr">${e.message}</div>`;}

function mNewEst(){
  if(!proj){toast('Open a project first','err');return;}
  showM(`<div class="mo" onclick="if(event.target===this)closeM()"><div class="mb">
    <div class="mt">Start estimate</div><div id="merr"></div>
    <div class="fg"><label class="fl">Project</label><input class="fi" value="${proj.name}" disabled></div>
    <div class="fr"><div class="fg"><label class="fl">PM fee ($)</label><input class="fi" id="epm" type="number" placeholder="0"></div>
    <div class="fg"><label class="fl">Status</label><select class="fi" id="est"><option value="draft">Draft</option><option value="internal_review">Internal review</option></select></div></div>
    <div class="fg"><label class="fl">Shannon's build notes</label><textarea class="fi" id="ent" placeholder="From Brent's Slack message..."></textarea></div>
    <div class="ma"><button class="btn" onclick="closeM()">Cancel</button><button class="btn btn-p" onclick="saveEst()"><i class="ti ti-check"></i> Create estimate</button></div>
  </div></div>`);
}
async function saveEst(){
  try{const pmFee=parseFloat(document.getElementById('epm').value)||0;const r=await dbPost('estimates',{project_id:proj.id,version:1,status:document.getElementById('est').value,pm_fee_total:pmFee,notes_internal:document.getElementById('ent').value.trim()});if(pmFee>0&&r[0])await dbPost('estimate_line_items',{estimate_id:r[0].id,bucket:'pm_fee',description:'Project management fee',owner_price:pmFee,builder_cost:pmFee,sort_order:1});closeM();toast('Estimate created');const ests=await db('estimates',`?project_id=eq.${proj.id}&order=created_at.desc`);_d.ests=ests;dEstimate(ests,proj);}
  catch(e){document.getElementById('merr').innerHTML=`<div class="merr">${e.message}</div>`;}
}

async function mAddItem(estId,bucket){
  const codes=await db('cost_codes','?is_active=eq.true&order=code.asc&limit=200');
  showM(`<div class="mo" onclick="if(event.target===this)closeM()"><div class="mb wide">
    <div class="mt">Add line item</div><div id="merr"></div>
    <div class="fg"><label class="fl">Description</label><input class="fi" id="lid" placeholder="e.g. Tile master bath — labor and materials"></div>
    <div class="fr"><div class="fg"><label class="fl">Cost code</label><select class="fi" id="lcc"><option value="">— Select —</option>${codes.map(c=>`<option value="${c.id}">${c.code} — ${c.name}</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">Bucket</label><select class="fi" id="lbk"><option value="pm_fee"${bucket==='pm_fee'?' selected':''}>PM fee</option><option value="construction"${bucket==='construction'?' selected':''}>Construction</option><option value="allowance"${bucket==='allowance'?' selected':''}>Allowance</option></select></div></div>
    <div class="fr3">
      <div class="fg"><label class="fl">Builder cost ($)</label><input class="fi" id="lbc" type="number" placeholder="0" oninput="calcOP()"></div>
      <div class="fg"><label class="fl">Markup type</label><select class="fi" id="lmt" onchange="calcOP()"><option value="percent">Percent (%)</option><option value="flat">Flat ($)</option></select></div>
      <div class="fg"><label class="fl">Markup value</label><input class="fi" id="lmv" type="number" placeholder="0" oninput="calcOP()"></div>
    </div>
    <div class="fg"><label class="fl">Owner / client price ($)</label><input class="fi" id="lop" type="number" placeholder="0"></div>
    <div class="fr"><div class="fg"><label class="fl">Internal note</label><input class="fi" id="lni" placeholder="Internal only"></div><div class="fg"><label class="fl">Client note</label><input class="fi" id="lne" placeholder="Client-facing"></div></div>
    <div class="ma"><button class="btn" onclick="closeM()">Cancel</button><button class="btn btn-p" onclick="saveItem('${estId}')"><i class="ti ti-check"></i> Add</button></div>
  </div></div>`);
}
function calcOP(){const cost=parseFloat(document.getElementById('lbc').value)||0;const type=document.getElementById('lmt').value;const val=parseFloat(document.getElementById('lmv').value)||0;document.getElementById('lop').value=Math.round(type==='percent'?cost*(1+val/100):cost+val);}
async function saveItem(estId){
  const desc=document.getElementById('lid').value.trim();if(!desc){document.getElementById('merr').innerHTML='<div class="merr">Description required.</div>';return;}
  try{await dbPost('estimate_line_items',{estimate_id:estId,cost_code_id:document.getElementById('lcc').value||null,bucket:document.getElementById('lbk').value,description:desc,builder_cost:parseFloat(document.getElementById('lbc').value)||0,markup_type:document.getElementById('lmt').value,markup_value:parseFloat(document.getElementById('lmv').value)||0,owner_price:parseFloat(document.getElementById('lop').value)||0,notes_internal:document.getElementById('lni').value.trim(),notes_external:document.getElementById('lne').value.trim()});closeM();toast('Line item added');const ests=await db('estimates',`?project_id=eq.${proj.id}&order=created_at.desc`);_d.ests=ests;dEstimate(ests,proj);}
  catch(e){document.getElementById('merr').innerHTML=`<div class="merr">${e.message}</div>`;}
}

function mNote(){showM(`<div class="mo" onclick="if(event.target===this)closeM()"><div class="mb">
  <div class="mt">Log a note</div><div id="merr"></div>
  <div class="fr"><div class="fg"><label class="fl">Author</label><select class="fi" id="nau"><option value="brent">Brent</option><option value="shannon">Shannon</option><option value="alex">Alex</option><option value="faith">Faith</option></select></div>
  <div class="fg"><label class="fl">Type</label><select class="fi" id="nty"><option value="site_visit">Site visit</option><option value="client_communication">Client communication</option><option value="internal">Internal</option><option value="daily_log">Daily log</option></select></div></div>
  <div class="fg"><label class="fl">Note</label><textarea class="fi" id="nco" placeholder="What happened, what was decided, what's next..." style="min-height:120px"></textarea></div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><input type="checkbox" id="ncv"> <label for="ncv" style="font-size:13px">Client visible</label></div>
  <div class="ma"><button class="btn" onclick="closeM()">Cancel</button><button class="btn btn-p" onclick="saveNote()"><i class="ti ti-check"></i> Save</button></div>
</div></div>`);}
async function saveNote(){
  const content=document.getElementById('nco').value.trim();if(!content){document.getElementById('merr').innerHTML='<div class="merr">Note required.</div>';return;}if(!proj){document.getElementById('merr').innerHTML='<div class="merr">No project selected.</div>';return;}
  try{const r=await dbPost('project_notes',{project_id:proj.id,author:document.getElementById('nau').value,note_type:document.getElementById('nty').value,content,is_client_visible:document.getElementById('ncv').checked});_d.notes.unshift(r[0]);closeM();toast('Note saved');document.getElementById('dbody').innerHTML=dNotes(_d.notes);}
  catch(e){document.getElementById('merr').innerHTML=`<div class="merr">${e.message}</div>`;}
}

function mStatus(){if(!proj)return;
  showM(`<div class="mo" onclick="if(event.target===this)closeM()"><div class="mb">
    <div class="mt">Update project status</div><div id="merr"></div>
    <div class="fg"><label class="fl">Status</label><select class="fi" id="ups">${['lead','vetting','estimating','proposed','active','punch_list','complete','on_hold','lost'].map(s=>`<option value="${s}"${s===proj.status?' selected':''}>${sl(s)}</option>`).join('')}</select></div>

    <div class="ma"><button class="btn" onclick="closeM()">Cancel</button><button class="btn btn-p" onclick="saveStatus()"><i class="ti ti-check"></i> Update</button></div>

async function saveStatus(){
  try{await dbPatch('projects',proj.id,{status:document.getElementById('ups').value,health_status:document.getElementById('uph').value,health_notes:document.getElementById('uphn').value.trim()});proj.status=document.getElementById('ups').value;proj.health_status=document.getElementById('uph').value;closeM();toast('Status updated');pDetail();}

nav('dashboard');
</script>
